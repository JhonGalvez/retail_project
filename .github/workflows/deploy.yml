name: Deploy ETL Retail Analytics

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Install jq and curl
        run: sudo apt-get update && sudo apt-get install -y jq curl

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Instalar dependencias
        run: pip install flake8 pytest

      - name: Lint con flake8
        run: flake8 src/ --max-line-length=120 --ignore=E501,W503,E221,E241,E302,E305

      - name: Ejecutar unit tests
        run: pytest tests/ -v --tb=short

      - name: Export multiple notebooks (raw)
        run: |
          ORIGIN_HOST=${{ secrets.DATABRICKS_ORIGIN_HOST }}
          ORIGIN_TOKEN=${{ secrets.DATABRICKS_ORIGIN_TOKEN }}
          NOTEBOOK_BASE="/Workspace/Users/galvezsantosjhon@outlook.com/retail_project/proceso"
          NOTEBOOKS=(
            "0_preparacion_ambiente"
            "1_ingest_ecommerce"
            "1_ingest_superstore"
            "2_transform_ecommerce"
            "2_transform_superstore"
            "3_load"
            "4_grants"
          )
          mkdir -p notebooks_to_deploy
          for nb in "${NOTEBOOKS[@]}"; do
            echo "Exportando $nb en modo raw..."
            curl -s -X GET \
              -H "Authorization: Bearer $ORIGIN_TOKEN" \
              "$ORIGIN_HOST/api/2.0/workspace/export?path=$NOTEBOOK_BASE/$nb&format=SOURCE&direct_download=true" \
              --output "notebooks_to_deploy/$nb.py"
            echo "OK: notebooks_to_deploy/$nb.py"
          done

      - name: Deploy notebooks to Destination Workspace
        run: |
          DEST_HOST=${{ secrets.DATABRICKS_DEST_HOST }}
          DEST_TOKEN=${{ secrets.DATABRICKS_DEST_TOKEN }}
          DEST_BASE="/retail_project/proceso"
          for file in notebooks_to_deploy/*.py; do
            name=$(basename "$file" .py)
            dest_path="$DEST_BASE/$name"
            echo "Creando carpeta $DEST_BASE si no existe..."
            curl -s -X POST \
              -H "Authorization: Bearer $DEST_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"path\":\"$DEST_BASE\"}" \
              "$DEST_HOST/api/2.0/workspace/mkdirs"
            echo "Importando $file → $dest_path"
            response=$(curl -s -X POST \
              -H "Authorization: Bearer $DEST_TOKEN" \
              -H "Content-Type: multipart/form-data" \
              -F "path=$dest_path" \
              -F "format=SOURCE" \
              -F "language=PYTHON" \
              -F "overwrite=true" \
              -F "content=@$file" \
              "$DEST_HOST/api/2.0/workspace/import")
            echo "Response: $response"
          done

      - name: Check if workflow exists and delete if necessary
        run: |
          DEST_HOST=${{ secrets.DATABRICKS_DEST_HOST }}
          DEST_TOKEN=${{ secrets.DATABRICKS_DEST_TOKEN }}
          WORKFLOW_NAME="WF_RETAIL_ETL"
          echo "Verificando si existe el workflow: $WORKFLOW_NAME"
          workflows_response=$(curl -s -X GET \
            -H "Authorization: Bearer $DEST_TOKEN" \
            "$DEST_HOST/api/2.1/jobs/list")
          existing_job_id=$(echo "$workflows_response" | jq -r --arg name "$WORKFLOW_NAME" \
            '.jobs[]? | select(.settings.name == $name) | .job_id')
          if [ "$existing_job_id" != "" ] && [ "$existing_job_id" != "null" ]; then
            echo "Workflow encontrado con ID: $existing_job_id. Eliminando..."
            delete_response=$(curl -s -X POST \
              -H "Authorization: Bearer $DEST_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"job_id\": $existing_job_id}" \
              "$DEST_HOST/api/2.1/jobs/delete")
            echo "Delete response: $delete_response"
          else
            echo "No se encontró workflow existente con nombre: $WORKFLOW_NAME"
          fi

      - name: Get existing cluster ID
        run: |
          DEST_HOST=${{ secrets.DATABRICKS_DEST_HOST }}
          DEST_TOKEN=${{ secrets.DATABRICKS_DEST_TOKEN }}
          CLUSTER_NAME="cluster-retail-prod"
          echo "Buscando cluster existente: $CLUSTER_NAME"
          clusters_response=$(curl -s -X GET \
            -H "Authorization: Bearer $DEST_TOKEN" \
            "$DEST_HOST/api/2.0/clusters/list")
          echo "Clusters response: $clusters_response"
          cluster_id=$(echo "$clusters_response" | jq -r --arg name "$CLUSTER_NAME" \
            '.clusters[]? | select(.cluster_name == $name) | .cluster_id')
          if [ "$cluster_id" != "" ] && [ "$cluster_id" != "null" ]; then
            echo "Cluster encontrado: $CLUSTER_NAME con ID: $cluster_id"
            echo "CLUSTER_ID=$cluster_id" >> $GITHUB_ENV
          else
            echo "No se encontro el cluster: $CLUSTER_NAME"
            echo "Clusters disponibles:"
            echo "$clusters_response" | jq -r '.clusters[]? | .cluster_name'
            exit 1
          fi

      - name: Create Databricks Workflow WF_RETAIL_ETL
        run: |
          DEST_HOST=${{ secrets.DATABRICKS_DEST_HOST }}
          DEST_TOKEN=${{ secrets.DATABRICKS_DEST_TOKEN }}
          DEST_BASE="/retail_project/proceso"
          CLUSTER_ID="${{ env.CLUSTER_ID }}"
          echo "Creando workflow: WF_RETAIL_ETL con cluster ID: $CLUSTER_ID"
          cat > workflow_config.json << EOF
          {
            "name": "WF_RETAIL_ETL",
            "format": "MULTI_TASK",
            "tasks": [
              {
                "task_key": "0_preparacion_ambiente",
                "description": "Crea catalog retail_project_prod y schemas bronze, silver, gold",
                "notebook_task": {
                  "notebook_path": "$DEST_BASE/0_preparacion_ambiente",
                  "source": "WORKSPACE",
                  "base_parameters": {
                    "storageName": "retaildatalakejp01",
                    "container": "raw",
                    "catalogo": "retail_project_prod"
                  }
                },
                "existing_cluster_id": "$CLUSTER_ID",
                "timeout_seconds": 3600,
                "max_retries": 2
              },
              {
                "task_key": "1_ingest_ecommerce",
                "description": "Ingesta E-Commerce Sales Prediction a capa Bronze",
                "notebook_task": {
                  "notebook_path": "$DEST_BASE/1_ingest_ecommerce",
                  "source": "WORKSPACE",
                  "base_parameters": {
                    "storageName": "retaildatalakejp01",
                    "container": "raw",
                    "catalogo": "retail_project_prod",
                    "esquema": "bronze"
                  }
                },
                "existing_cluster_id": "$CLUSTER_ID",
                "timeout_seconds": 3600,
                "max_retries": 2,
                "depends_on": [{"task_key": "0_preparacion_ambiente"}]
              },
              {
                "task_key": "1_ingest_superstore",
                "description": "Ingesta Superstore Bundle (6 archivos) a capa Bronze",
                "notebook_task": {
                  "notebook_path": "$DEST_BASE/1_ingest_superstore",
                  "source": "WORKSPACE",
                  "base_parameters": {
                    "storageName": "retaildatalakejp01",
                    "container": "raw",
                    "catalogo": "retail_project_prod",
                    "esquema": "bronze"
                  }
                },
                "existing_cluster_id": "$CLUSTER_ID",
                "timeout_seconds": 3600,
                "max_retries": 2,
                "depends_on": [{"task_key": "0_preparacion_ambiente"}]
              },
              {
                "task_key": "2_transform_ecommerce",
                "description": "Limpieza y transformacion E-Commerce Bronze → Silver",
                "notebook_task": {
                  "notebook_path": "$DEST_BASE/2_transform_ecommerce",
                  "source": "WORKSPACE",
                  "base_parameters": {
                    "catalogo": "retail_project_prod",
                    "esquema_source": "bronze",
                    "esquema_sink": "silver"
                  }
                },
                "existing_cluster_id": "$CLUSTER_ID",
                "timeout_seconds": 3600,
                "max_retries": 2,
                "depends_on": [{"task_key": "1_ingest_ecommerce"}]
              },
              {
                "task_key": "2_transform_superstore",
                "description": "Join 5 tablas Superstore Bronze → Silver",
                "notebook_task": {
                  "notebook_path": "$DEST_BASE/2_transform_superstore",
                  "source": "WORKSPACE",
                  "base_parameters": {
                    "catalogo": "retail_project_prod",
                    "esquema_source": "bronze",
                    "esquema_sink": "silver"
                  }
                },
                "existing_cluster_id": "$CLUSTER_ID",
                "timeout_seconds": 3600,
                "max_retries": 2,
                "depends_on": [{"task_key": "1_ingest_superstore"}]
              },
              {
                "task_key": "3_load",
                "description": "Genera 5 tablas KPI Silver → Gold para dashboard",
                "notebook_task": {
                  "notebook_path": "$DEST_BASE/3_load",
                  "source": "WORKSPACE",
                  "base_parameters": {
                    "catalogo": "retail_project_prod",
                    "esquema_source": "silver",
                    "esquema_sink": "gold"
                  }
                },
                "existing_cluster_id": "$CLUSTER_ID",
                "timeout_seconds": 7200,
                "max_retries": 2,
                "depends_on": [
                  {"task_key": "2_transform_ecommerce"},
                  {"task_key": "2_transform_superstore"}
                ]
              },
              {
                "task_key": "4_grants",
                "description": "Otorga permisos SELECT sobre tablas Gold a account users",
                "notebook_task": {
                  "notebook_path": "$DEST_BASE/4_grants",
                  "source": "WORKSPACE",
                  "base_parameters": {
                    "catalogo": "retail_project_prod"
                  }
                },
                "existing_cluster_id": "$CLUSTER_ID",
                "timeout_seconds": 1800,
                "max_retries": 2,
                "depends_on": [{"task_key": "3_load"}]
              }
            ],
            "schedule": {
              "quartz_cron_expression": "0 0 8 * * ?",
              "timezone_id": "America/Lima",
              "pause_status": "PAUSED"
            },
            "email_notifications": {
              "on_failure": [],
              "on_success": [],
              "no_alert_for_skipped_runs": false
            },
            "webhook_notifications": {},
            "timeout_seconds": 7200,
            "max_concurrent_runs": 1,
            "tags": {
              "environment": "production",
              "created_by": "github_actions",
              "project": "retail_analytics",
              "cluster_used": "cluster-retail-prod"
            }
          }
          EOF
          create_response=$(curl -s -X POST \
            -H "Authorization: Bearer $DEST_TOKEN" \
            -H "Content-Type: application/json" \
            -d @workflow_config.json \
            "$DEST_HOST/api/2.1/jobs/create")
          echo "Workflow creation response: $create_response"
          job_id=$(echo "$create_response" | jq -r '.job_id')
          if [ "$job_id" != "" ] && [ "$job_id" != "null" ]; then
            echo "Workflow WF_RETAIL_ETL creado exitosamente con ID: $job_id"
            echo "JOB_ID=$job_id" >> $GITHUB_ENV
          else
            echo "Error al crear el workflow"
            echo "Response completo: $create_response"
            exit 1
          fi

      - name: Validate Workflow Configuration
        run: |
          DEST_HOST=${{ secrets.DATABRICKS_DEST_HOST }}
          DEST_TOKEN=${{ secrets.DATABRICKS_DEST_TOKEN }}
          WORKFLOW_NAME="WF_RETAIL_ETL"
          echo "Validando la configuracion del workflow creado..."
          workflows_list=$(curl -s -X GET \
            -H "Authorization: Bearer $DEST_TOKEN" \
            "$DEST_HOST/api/2.1/jobs/list")
          job_id=$(echo "$workflows_list" | jq -r --arg name "$WORKFLOW_NAME" \
            '.jobs[]? | select(.settings.name == $name) | .job_id')
          if [ "$job_id" != "" ] && [ "$job_id" != "null" ]; then
            echo "Workflow encontrado con ID: $job_id"
            job_details=$(curl -s -X GET \
              -H "Authorization: Bearer $DEST_TOKEN" \
              "$DEST_HOST/api/2.1/jobs/get?job_id=$job_id")
            echo "Resumen del workflow:"
            echo "Nombre: $(echo "$job_details" | jq -r '.settings.name')"
            echo "Numero de tareas: $(echo "$job_details" | jq '.settings.tasks | length')"
            echo ""
            echo "Tareas configuradas:"
            echo "$job_details" | jq -r '.settings.tasks[] | "- " + .task_key + " → " + .notebook_task.notebook_path'
            echo ""
            echo "Cluster configurado:"
            echo "Cluster ID: $(echo "$job_details" | jq -r '.settings.tasks[0].existing_cluster_id')"
            echo "Cluster Name: cluster-retail-prod (reutilizado)"
          else
            echo "No se pudo encontrar el workflow creado"
            exit 1
          fi

      - name: Execute Workflow WF_RETAIL_ETL
        run: |
          DEST_HOST=${{ secrets.DATABRICKS_DEST_HOST }}
          DEST_TOKEN=${{ secrets.DATABRICKS_DEST_TOKEN }}
          WORKFLOW_NAME="WF_RETAIL_ETL"
          echo "Ejecutando workflow: $WORKFLOW_NAME"
          workflows_list=$(curl -s -X GET \
            -H "Authorization: Bearer $DEST_TOKEN" \
            "$DEST_HOST/api/2.1/jobs/list")
          job_id=$(echo "$workflows_list" | jq -r --arg name "$WORKFLOW_NAME" \
            '.jobs[]? | select(.settings.name == $name) | .job_id')
          if [ "$job_id" != "" ] && [ "$job_id" != "null" ]; then
            echo "Workflow encontrado con ID: $job_id"
            run_response=$(curl -s -X POST \
              -H "Authorization: Bearer $DEST_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"job_id\": $job_id}" \
              "$DEST_HOST/api/2.1/jobs/run-now")
            run_id=$(echo "$run_response" | jq -r '.run_id')
            if [ "$run_id" != "" ] && [ "$run_id" != "null" ]; then
              echo "Workflow ejecutado exitosamente!"
              echo "Run ID: $run_id"
              echo "WORKFLOW_RUN_ID=$run_id" >> $GITHUB_ENV
              echo "WORKFLOW_JOB_ID=$job_id" >> $GITHUB_ENV
              echo "URL del workflow: $DEST_HOST/jobs/$job_id/runs/$run_id"
            else
              echo "Error al ejecutar el workflow"
              echo "Response: $run_response"
              exit 1
            fi
          else
            echo "No se pudo encontrar el workflow para ejecutar"
            exit 1
          fi

      - name: Monitor Workflow Execution
        run: |
          DEST_HOST=${{ secrets.DATABRICKS_DEST_HOST }}
          DEST_TOKEN=${{ secrets.DATABRICKS_DEST_TOKEN }}
          RUN_ID="${{ env.WORKFLOW_RUN_ID }}"
          JOB_ID="${{ env.WORKFLOW_JOB_ID }}"
          echo "Monitoreando ejecucion del workflow..."
          echo "Job ID: $JOB_ID"
          echo "Run ID: $RUN_ID"
          max_wait_time=1200
          wait_time=0
          check_interval=30
          while [ $wait_time -lt $max_wait_time ]; do
            run_status=$(curl -s -X GET \
              -H "Authorization: Bearer $DEST_TOKEN" \
              "$DEST_HOST/api/2.1/jobs/runs/get?run_id=$RUN_ID")
            state=$(echo "$run_status" | jq -r '.state.life_cycle_state')
            result_state=$(echo "$run_status" | jq -r '.state.result_state // "RUNNING"')
            echo "Estado actual: $state ($result_state) - Tiempo transcurrido: ${wait_time}s"
            echo "$run_status" | jq -r '.tasks[]? | "  " + .task_key + ": " + .state.life_cycle_state + " (" + (.state.result_state // "RUNNING") + ")"'
            case "$state" in
              "TERMINATED")
                if [ "$result_state" = "SUCCESS" ]; then
                  echo "Workflow completado exitosamente!"
                  echo ""
                  echo "Resumen de ejecucion:"
                  echo "$run_status" | jq -r '.tasks[]? | "OK " + .task_key + " → " + (.state.result_state // "SUCCESS")'
                  start_time=$(echo "$run_status" | jq -r '.start_time')
                  end_time=$(echo "$run_status" | jq -r '.end_time')
                  if [ "$start_time" != "null" ] && [ "$end_time" != "null" ]; then
                    duration=$((($end_time - $start_time) / 1000))
                    echo "Duracion total: ${duration} segundos"
                  fi
                  exit 0
                else
                  echo "Workflow termino con errores: $result_state"
                  echo "Detalles de las tareas:"
                  echo "$run_status" | jq -r '.tasks[]? | "ERROR " + .task_key + ": " + (.state.result_state // "UNKNOWN")'
                  exit 1
                fi
                ;;
              "INTERNAL_ERROR"|"SKIPPED")
                echo "Workflow fallo con estado: $state"
                exit 1
                ;;
              *)
                echo "Workflow aun ejecutandose..."
                ;;
            esac
            sleep $check_interval
            wait_time=$((wait_time + check_interval))
          done
          echo "Timeout: El workflow aun se esta ejecutando despues de $max_wait_time segundos"
          echo "Verifica el estado en: $DEST_HOST/jobs/$JOB_ID/runs/$RUN_ID"
          echo "El workflow seguira ejecutandose en Databricks"
          exit 0

      - name: Clean up
        run: |
          rm -rf notebooks_to_deploy
          rm -f workflow_config.json

      - name: Done
        run: |
          echo "Despliegue y ejecucion completados exitosamente!"
          echo ""
          echo "Resumen:"
          echo "Notebooks desplegados: 0_preparacion_ambiente, 1_ingest_ecommerce, 1_ingest_superstore, 2_transform_ecommerce, 2_transform_superstore, 3_load"
          echo "Workflow creado: WF_RETAIL_ETL"
          echo "Tareas configuradas:"
          echo "   - 0_preparacion_ambiente"
          echo "   - 1_ingest_ecommerce"
          echo "   - 1_ingest_superstore"
          echo "   - 2_transform_ecommerce"
          echo "   - 2_transform_superstore"
          echo "   - 3_load"
          echo "Cluster utilizado: cluster-retail-prod"
          echo "Workflow ejecutado automaticamente"
          echo ""
          echo "Accede a tu workspace de Databricks para ver los resultados detallados"
